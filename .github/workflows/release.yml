name: Test CI Workflow

on: # Definition of events to trigger workflows
  workflow_call: 
    secrets:
      SONAR_TOKEN:
        required: true
      SONAR_PROJECT_KEY:
        required: true
      SONAR_ORGANIZATION:
        required: true
      AWS_ACCESS_KEY_ID:
        required: true
      AWS_SECRET_ACCESS_KEY:
        required: true

jobs:
  validate_files:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Check if tsconfig.json exists
        run: |
          if [ ! -f tsconfig.json ]; then
            echo "🚨 ERROR: tsconfig.json is missing. It is required for the build process."
            exit 1
          fi
        shell: bash

  build_and_test:
    runs-on: ubuntu-latest
    needs: validate_files
    env:
      NODE_VERSION: 18

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build the application
        run: npm run build

      - name: Run unit tests
        run: npm run test

  #     - name: Run SonarQube analysis
  #       if: github.ref == 'refs/heads/main'
  #       run: |
  #         npx sonar-scanner \
  #           -Dsonar.host.url=https://sonarcloud.io \
  #           -Dsonar.projectKey=${{ secrets.SONAR_PROJECT_KEY }} \
  #           -Dsonar.organization=${{ secrets.SONAR_ORGANIZATION }} \
  #           -Dsonar.token=${{ secrets.SONAR_TOKEN }} \
  #           -Dsonar.sources=src \
  #           -Dsonar.tests=src/tests \
  #           -Dsonar.exclusions=**/*.test.ts \
  #           -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info
  #       env:
  #         SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
  #         SONAR_PROJECT_KEY: ${{ secrets.SONAR_PROJECT_KEY }}
  #         SONAR_ORGANIZATION: ${{ secrets.SONAR_ORGANIZATION }}

  # ## Blocks pipeline if did not pass quality gate. Activate only for production
  #     - name: SonarCloud Quality Gate
  #       if: github.ref == 'refs/heads/main'
  #       uses: SonarSource/sonarqube-quality-gate-action@v1.1.0
  #       timeout-minutes: 5
  #       env:
  #         SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
  #         SONAR_PROJECT_KEY: ${{ secrets.SONAR_PROJECT_KEY }}
  #         SONAR_ORGANIZATION: ${{ secrets.SONAR_ORGANIZATION }}

  docker-build_and_push:
    runs-on: ubuntu-latest
    needs: build_and_test
    env:
      ecr_repo: aws-bootcamp-class5
      aws_region: us-east-1
      tag: latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build Docker Image
        run: docker build -t ${{ env.ecr_repo }} .

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v5.1.1
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.aws_region }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Tag and Push Image to ECR
        id: docker-tag  
        env:
          ecr_registry: ${{ steps.login-ecr.outputs.registry }}
        run: |
        docker tag ${{ env.ecr_repo }}:{{ env.tag }} ${{ env.ecr_registry }}/{{ env.ecr_repo }}:{{ env.tag }}
        docker push ${{ env.ecr_registry }}/{{ env.ecr_repo }}:{{ env.tag }}