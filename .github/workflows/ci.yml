name: Test CI Workflow

on: # Definition of events to trigger workflows
  workflow_call: 
    secrets:
      SONAR_TOKEN:
        required: true
      # SONAR_PROJECT_KEY:
      #   required: true
      # SONAR_ORGANIZATION:
      #   required: true
      # SONAR_HOST_URL:
      #   required: true

jobs:
  validate_files:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Check if tsconfig.json exists
        run: |
          if [ ! -f tsconfig.json ]; then
            echo "🚨 ERROR: tsconfig.json is missing. It is required for the build process."
            exit 1
          fi
        shell: bash

  build_and_test:
    runs-on: ubuntu-latest
    needs: validate_files
    env:
      NODE_VERSION: 18

    # permissions:
    #   security-events: write
    #   contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Run unit tests
        run: npm run test

      - name: Build the application
        run: npm run build

      - name: Run SonarQube analysis
        if: github.ref == 'refs/heads/main'
        run: |
          npx sonar-scanner \
            -Dsonar.projectKey=Minsait-Teste_ecs-backend \
            -Dsonar.organization=minsait-teste \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.token=${{ secrets.SONAR_TOKEN }} \
            -Dsonar.sources=src \
            -Dsonar.tests=src/tests \
            -Dsonar.exclusions=**/*.test.ts \
            -Dsonar.javascript.lcov.reportPaths=coverage/lcov.info
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}  

  ## Blocks pipeline if did not pass quality gate. Activate only for production
      - name: SonarCloud Quality Gate
        if: github.ref == 'refs/heads/main'
        uses: SonarSource/sonarqube-quality-gate-action@v1.1.0
        timeout-minutes: 5
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_PROJECT_KEY: Minsait-Teste_desafio-minsait

